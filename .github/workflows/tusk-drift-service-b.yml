# Tusk Drift Trace Tests for Service B

name: Tusk Drift - Service B

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tusk-drift:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service-b
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run Tusk Drift trace tests
        uses: Use-Tusk/drift-action@v1
        with:
          working-directory: service-b
          cache-key: ${{ runner.os }}-tusk-drift-service-b-${{ hashFiles('service-b/.tusk/config.yaml') }}
          api-key: ${{ secrets.TUSK_API_KEY }}
